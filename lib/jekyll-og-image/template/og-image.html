<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      overflow: hidden;
    }

    .accent {
      display: block;
      width: 64px;
      height: 6px;
      background: #6366f1;
      border-radius: 3px;
      margin-bottom: 32px;
    }

    .title {
      font-size: 64px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #f8fafc;
      max-width: 900px;
      margin-bottom: 40px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .date {
      font-size: 22px;
      color: #94a3b8;
      font-weight: 500;
    }

    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 18px;
      font-weight: 600;
      color: #818cf8;
      background: rgba(99, 102, 241, 0.15);
      padding: 4px 14px;
      border-radius: 999px;
    }

    .site {
      position: absolute;
      top: 64px;
      right: 64px;
      font-size: 20px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  {% if site.title != "" %}<span class="site">{{ site.title }}</span>{% endif %}
  <span class="accent"></span>
  <h1 class="title">{{ page.title | default: page.url }}</h1>
  <div class="meta">
    {% if page.date %}<span class="date">{{ page.date | date: "%B %-d, %Y" }}</span>{% endif %}
    {% if page.tags.size > 0 %}
    <div class="tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </div>
</body>
</html>
